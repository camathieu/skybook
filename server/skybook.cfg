# SkyBook Configuration
# =====================
# All values shown are defaults. Uncomment and modify as needed.
# Environment variable overrides use SKYBOOK_ prefix with SCREAMING_SNAKE_CASE.
# Example: SKYBOOK_SERVER_LISTENPORT=9090

[server]
# ListenAddress = "0.0.0.0"
# ListenPort = 8080
# Debug = false

[database]
# Path = "./skybook.db"

[defaults]
# UnitSystem = "imperial"       # "imperial" or "metric"
# DefaultJumpType = "FF"        # Default jump type for new entries

# --- Future sections (not yet implemented) ---

